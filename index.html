<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Earn & Withdraw App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* Mobile-first approach - Screen responsive */
        body, html {
            margin: 0; padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: #6a0dad;
            height: 100dvh; /* Dynamic Height for mobiles */
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .app-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            position: relative;
        }

        /* Balance Badge */
        .balance-badge {
            margin: 15px;
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 20px;
            border-radius: 20px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: inline-block;
            width: fit-content;
        }

        /* Pages */
        .page { display: none; flex: 1; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
        .active { display: flex; }

        /* Responsive Elements */
        .random-number { font-size: 15vw; color: #ffffff; font-weight: bold; margin-bottom: 20px; }
        
        .input-box {
            width: 85%; max-width: 400px; padding: 4vw; font-size: 8vw;
            text-align: center; border-radius: 15px; border: none; outline: none; letter-spacing: 5px;
        }
        
        .enter-btn {
            background-color: #ffd700; color: #000; padding: 3vw 12vw; margin-top: 30px;
            border: none; border-radius: 50px; font-size: 6vw; font-weight: bold;
            cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        /* Withdraw Responsive Inputs */
        .w-input { 
            width: 80%; max-width: 350px; padding: 3vw; 
            margin-bottom: 2vw; border-radius: 10px; border: none; font-size: 4vw; 
        }
        .withdraw-btn { 
            background-color: #2ecc71; color: white; padding: 3vw 8vw; 
            border: none; border-radius: 50px; font-size: 5vw; cursor: pointer; margin-top: 2vw; 
        }

        .history-card {
            background: white; width: 80%; max-width: 350px; padding: 3vw;
            border-radius: 10px; margin-top: 3vw; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            font-size: 3.5vw;
        }

        /* Popup */
        .popup-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .popup-box { background: white; padding: 5vw; border-radius: 15px; width: 80%; max-width: 300px; text-align: center; }

        /* Bottom Nav */
        .bottom-nav {
            background-color: #ffffff; height: 70px; flex-shrink: 0;
            display: flex; justify-content: space-around; align-items: center;
            border-top-left-radius: 20px; border-top-right-radius: 20px;
        }
        .nav-item { cursor: pointer; color: #6a0dad; display: flex; flex-direction: column; align-items: center; font-size: 3vw; font-weight: bold; background: none; border: none; }
        .nav-item i { font-size: 6vw; margin-bottom: 2px; }
    </style>
</head>
<body>

    <div class="app-container">
        <!-- Balance Badge -->
        <div class="balance-badge">
            <i class="fas fa-dollar-sign"></i> <span id="balance">0</span>
        </div>

        <!-- HOME PAGE -->
        <div id="home-page" class="page active">
            <div class="random-number" id="randomDisplay">00000</div>
            <input type="number" id="pinInput" class="input-box" placeholder="00000" maxlength="5">
            <button class="enter-btn" onclick="checkNumber()">ENTER</button>
        </div>

        <!-- TASK PAGE -->
        <div id="task-page" class="page">
            <h2 style="color:white">No Tasks Available</h2>
        </div>

        <!-- WITHDRAWAL PAGE -->
        <div id="withdraw-page" class="page">
            <h2 style="color:white; margin: 10px;">Withdraw Funds</h2>
            <input type="number" id="w-amount" class="w-input" placeholder="Amount ($)">
            <input type="text" id="w-name" class="w-input" placeholder="Account Name">
            <input type="text" id="w-num" class="w-input" placeholder="Account Number">
            <input type="text" id="w-bank" class="w-input" placeholder="Bank Name">
            <input type="text" id="w-branch" class="w-input" placeholder="Branch">
            <button class="withdraw-btn" onclick="processWithdrawal()">WITHDRAW</button>
            <div id="history-container" style="width:100%; display:flex; flex-direction:column; align-items:center;"></div>
        </div>
    </div>

    <!-- Popup -->
    <div id="popup" class="popup-overlay">
        <div class="popup-box">
            <h2 id="popupTitle">Title</h2>
            <p id="popupMessage">Message</p>
            <button style="background:#6a0dad; color:white; border:none; padding:10px 20px; border-radius:5px;" onclick="closePopup()">OK</button>
        </div>
    </div>

    <!-- Bottom Nav -->
    <div class="bottom-nav">
        <button class="nav-item" onclick="switchPage('home-page')"><i class="fas fa-home"></i><span>HOME</span></button>
        <button class="nav-item" onclick="switchPage('task-page')"><i class="fas fa-tasks"></i><span>TASK</span></button>
        <button class="nav-item" onclick="switchPage('withdraw-page')"><i class="fas fa-wallet"></i><span>WITHDRAW</span></button>
    </div>

    <script>
        let balance = 0;
        let currentTarget = Math.floor(10000 + Math.random() * 90000);
        document.getElementById('randomDisplay').innerText = currentTarget;

        function switchPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
        }

        function checkNumber() {
            let userInput = document.getElementById("pinInput").value;
            if (userInput == currentTarget) {
                balance += 1;
                document.getElementById('balance').innerText = balance;
                showPopup("Success!", "නිවැරදියි! ඔබ $1 දිනාගත්තා.", true);
                currentTarget = Math.floor(10000 + Math.random() * 90000);
                document.getElementById('randomDisplay').innerText = currentTarget;
                document.getElementById("pinInput").value = "";
            } else {
                showPopup("Error!", "වැරදි අංකයක්!", false);
            }
        }

        function processWithdrawal() {
            let amount = parseInt(document.getElementById('w-amount').value);
            let name = document.getElementById('w-name').value;
            let num = document.getElementById('w-num').value;

            if (!amount || !name || !num) {
                showPopup("Error!", "සියලු විස්තර පුරවන්න.", false);
                return;
            }

            if (amount > balance) {
                showPopup("Error!", "බැලන්ස් එක ප්‍රමාණවත් නැත!", false);
            } else {
                balance -= amount;
                document.getElementById('balance').innerText = balance;
                
                let container = document.getElementById('history-container');
                let card = document.createElement('div');
                card.className = 'history-card';
                card.innerHTML = `<h4>Request</h4><p>Amount: $${amount}</p><p>Name: ${name}</p><p>Status: Processing...</p>`;
                container.prepend(card);
                
                showPopup("Success!", "සාර්ථකව භාරගන්නා ලදී.", true);
                document.querySelectorAll('.w-input').forEach(i => i.value = "");
            }
        }

        function showPopup(title, msg, isSuccess) {
            document.getElementById("popupTitle").innerText = title;
            document.getElementById("popupMessage").innerText = msg;
            document.getElementById("popupTitle").style.color = isSuccess ? "#2ecc71" : "#e74c3c";
            document.getElementById("popup").style.display = "flex";
        }
        function closePopup() {
            document.getElementById("popup").style.display = "none";
        }
    </script>
</body>
</html>
